[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    unit: Fast tests, no external dependencies
    integration: Requires test Postgres (docker compose -f docker-compose.test.yaml up -d)
    slow: Tests that take >5 seconds (rate-limited API mocks etc.)
addopts = -v --tb=short --strict-markers
